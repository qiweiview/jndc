# 服务端密钥，用于加密通信，请务必修改为安全的随机字符串
secrete: "your-secret-key-here"

# 日志级别: debug, info, warn, error
loglevel: "info"

# IP访问控制
blackList: # 禁止访问的IP地址列表
#- "192.168.1.1"
whiteList: # 允许访问的IP地址列表
#- "192.168.1.2"

# 服务端基础配置
servicePort: 81 # JNDC服务端监听端口
bindIp: "127.0.0.1" # JNDC服务端绑定IP地址

# 数据库配置
dbConfig:
  type: "mysql" # 数据库类型：mysql 或 sqlite
  #type: "sqlite" # 使用sqlite数据库
  url: "jdbc:mysql://localhost:3306/your_database?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true"
  name: "your_username" # 数据库用户名
  password: "your_password" # 数据库密码
  flywayEnable: true # 是否启用数据库版本控制

# 管理后台配置
manageConfig:
  managementApiPort: 777 # 管理后台API服务端口
  useSsl: false # 是否启用SSL加密
  jksPath: "path/to/your/certificate.jks" # SSL证书路径
  jksPass: "your_jks_password" # SSL证书密码
  loginName: "your_admin_username" # 管理后台登录用户名
  loginPassWord: "your_admin_password" # 管理后台登录密码
  adminEnable: true # 是否启用管理后台

# Web服务配置
webConfig:
  notFoundPage: "path/to/your/404.html" # 404错误页面路径
  httpPort: 80 # HTTP服务端口
  useSsl: false # 是否启用SSL加密
  jksPath: "path/to/your/certificate.jks" # SSL证书路径
  jksPass: "your_jks_password" # SSL证书密码
