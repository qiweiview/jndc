# 服务端密钥，用于加密通信，请务必修改为安全的随机字符串
secrete: "your-secret-key-here"

# 日志级别: debug, info, warn, error
loglevel: "info"

# 服务端基础配置
servicePort: 1081 # JNDC服务端监听端口
bindIp: "127.0.0.1" # JNDC服务端绑定IP地址

# 运行时数据清理配置
cleanupConfig:
  enabled: true # 是否开启SQLite数据清理
  runIntervalHours: 24 # 清理任务执行周期（小时）
  channelRecordRetentionDays: 30 # 断连记录保留天数
  ipFilterRecordRetentionDays: 30 # IP过滤命中记录保留天数
  trafficTrendMinuteRetentionDays: 3 # 分钟级流量趋势保留天数
  trafficTrendHourRetentionDays: 14 # 小时级流量趋势保留天数
  trafficTrendDayRetentionDays: 90 # 天级流量趋势保留天数
  trafficTrendMonthRetentionDays: 1095 # 月级流量趋势保留天数（约3年）
  vacuumAfterCleanup: true # 清理后压缩SQLite文件

# 管理后台配置
manageConfig:
  managementApiPort: 1777 # 管理后台API服务端口
  useSsl: false # 是否启用SSL加密
  jksPath: "path/to/your/certificate.jks" # SSL证书路径
  jksPass: "your_jks_password" # SSL证书密码
  loginName: "your_admin_username" # 管理后台登录用户名
  loginPassWord: "your_admin_password" # 管理后台登录密码

# Web服务配置
webConfig:
  notFoundPage: "path/to/your/404.html" # 404错误页面路径
  httpPort: 1080 # HTTP服务端口
  useSsl: false # 是否启用SSL加密
  jksPath: "path/to/your/certificate.jks" # SSL证书路径
  jksPass: "your_jks_password" # SSL证书密码
