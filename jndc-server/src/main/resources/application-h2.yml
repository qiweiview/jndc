spring:
  h2: #h2 web console设置
    console:
      settings:
        web-allow-others: true #进行该配置后，h2 web consloe就可以在远程访问了。否则只能在本机访问。
      path: /h2 #进行该配置，你就可以通过YOUR_URL/h2访问h2 web consloe。YOUR_URL是你程序的访问URl。
      enabled: true #进行该配置，程序开启时就会启动h2 web consloe。当然这是默认的，如果你不想在启动程序时启动h2 web consloe，那么就设置为false。
  datasource:
    druid:
      read:
        validation-query: "select 1"
        test-while-idle: true
        min-evictable-idle-time-millis: 130000
        time-between-eviction-runs-millis: 30000
        max-wait: 60000
        connection-properties: "druid.stat.mergeSql=true;druid.stat.slowSqlMillis=500"
        filters: "stat,wall"
        max-active: 20
        driver-class-name: org.h2.Driver
        url: "jdbc:h2:./data/jndc-server;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false"
        type: com.alibaba.druid.pool.DruidDataSource
        username: "root"
        password: "wdwdwd"
        initial-size: 1
      write:
        validation-query: "select 1"
        test-while-idle: true
        min-evictable-idle-time-millis: 130000
        time-between-eviction-runs-millis: 30000
        max-wait: 60000
        connection-properties: "druid.stat.mergeSql=true;druid.stat.slowSqlMillis=500"
        filters: "stat,wall"
        max-active: 50
        driver-class-name: org.h2.Driver
        url: "jdbc:h2:./data/jndc-server;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false"
        type: com.alibaba.druid.pool.DruidDataSource
        username: "root"
        password: "wdwdwd"
        initial-size: 1
  data:
    redis:
      lettuce:
        pool:
          max-active: 8
          max-wait: 5000 #最大等待时间
          max-idle: 8
          min-idle: 1
        timeout: 10000
      database: 0
      host: "nuc"
      password: "qAkctTgqsQVRwkKmy0"  #密码
      port: 6379
      client-type: lettuce

ndc:
  server:
    port: 8888


